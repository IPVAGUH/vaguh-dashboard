<script>
// ── YouTube API Live Data Integration ──
const YT_CLIENT_ID = '79497155849-kjpf9tuag8hibt5c9fc80qlkad1on8tk.apps.googleusercontent.com';
const YT_SCOPES = 'https://www.googleapis.com/auth/youtube.readonly https://www.googleapis.com/auth/yt-analytics.readonly https://www.googleapis.com/auth/yt-analytics-monetary.readonly';

let _ytAccessToken = null;

function ytAuth() {
  return new Promise((resolve, reject) => {
    if (_ytAccessToken) { resolve(_ytAccessToken); return; }
    const client = google.accounts.oauth2.initTokenClient({
      client_id: YT_CLIENT_ID,
      scope: YT_SCOPES,
      callback: (resp) => {
        if (resp.error) { reject(resp.error); return; }
        _ytAccessToken = resp.access_token;
        resolve(_ytAccessToken);
      },
    });
    client.requestAccessToken();
  });
}

async function ytFetch(url, token) {
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
  if (!r.ok) throw new Error('API error: ' + r.status + ' ' + (await r.text()));
  return r.json();
}

async function pullYouTubeData(onStatus) {
  onStatus('Authenticating with Google...');
  const token = await ytAuth();

  // 1. Channel info
  onStatus('Pulling channel stats...');
  const chResp = await ytFetch('https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,contentDetails&mine=true', token);
  const ch = chResp.items[0];
  const subs = parseInt(ch.statistics.subscriberCount || 0);
  const totalViews = parseInt(ch.statistics.viewCount || 0);
  const videoCount = parseInt(ch.statistics.videoCount || 0);
  const channelId = ch.id;

  // 2. Analytics — lifetime (365 days)
  onStatus('Pulling analytics (revenue, watch hours)...');
  const end = new Date().toISOString().slice(0, 10);
  const start = new Date(Date.now() - 365 * 86400000).toISOString().slice(0, 10);
  const analyticsResp = await ytFetch(
    `https://youtubeanalytics.googleapis.com/v2/reports?ids=channel==${channelId}&startDate=${start}&endDate=${end}&metrics=views,estimatedMinutesWatched,estimatedRevenue,averageViewPercentage,subscribersGained,subscribersLost`, token
  );
  const aRow = analyticsResp.rows && analyticsResp.rows[0] ? analyticsResp.rows[0] : [0,0,0,0,0,0];
  const watchMinutes = aRow[1] || 0;
  const watchHours = Math.round(watchMinutes / 60);
  const revenue = aRow[2] || 0;
  const avgViewPct = aRow[3] || 0;

  // 3. Monthly revenue breakdown (last 6 months)
  onStatus('Pulling monthly revenue...');
  const mNow = new Date();
  const mStartMonth = mNow.getMonth() - 5; // 6 months back
  const mStartYear = mNow.getFullYear() + Math.floor(mStartMonth / 12);
  const mStartMo = ((mStartMonth % 12) + 12) % 12; // handle negative
  const mStartStr = mStartYear + '-' + String(mStartMo + 1).padStart(2, '0') + '-01';
  const mEndStr = mNow.getFullYear() + '-' + String(mNow.getMonth() + 1).padStart(2, '0') + '-01';
  const monthlyResp = await ytFetch(
    `https://youtubeanalytics.googleapis.com/v2/reports?ids=channel==${channelId}&startDate=${mStartStr}&endDate=${mEndStr}&metrics=views,estimatedMinutesWatched,estimatedRevenue&dimensions=month&sort=-month`, token
  );
  const monthlyRows = (monthlyResp.rows || []).map(r => ({
    month: r[0], views: r[1], minutes: r[2], revenue: r[3]
  }));

  // 4. Traffic sources
  onStatus('Pulling traffic sources...');
  const trafficResp = await ytFetch(
    `https://youtubeanalytics.googleapis.com/v2/reports?ids=channel==${channelId}&startDate=${start}&endDate=${end}&metrics=views,estimatedMinutesWatched&dimensions=insightTrafficSourceType&sort=-views`, token
  );
  const trafficRows = (trafficResp.rows || []).map(r => ({
    source: r[0], views: r[1], minutes: r[2]
  }));

  // 5. Top videos by revenue
  onStatus('Pulling top videos...');
  const topVidsResp = await ytFetch(
    `https://youtubeanalytics.googleapis.com/v2/reports?ids=channel==${channelId}&startDate=${start}&endDate=${end}&metrics=views,estimatedMinutesWatched,estimatedRevenue,averageViewDuration&dimensions=video&sort=-estimatedRevenue&maxResults=20`, token
  );
  const topVideoIds = (topVidsResp.rows || []).map(r => r[0]);
  let videoTitleMap = {};
  if (topVideoIds.length > 0) {
    const vidsResp = await ytFetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${topVideoIds.join(',')}`, token
    );
    (vidsResp.items || []).forEach(v => { videoTitleMap[v.id] = v.snippet.title; });
  }
  const topVideos = (topVidsResp.rows || []).map(r => ({
    id: r[0], title: videoTitleMap[r[0]] || r[0],
    views: r[1], minutes: r[2], revenue: r[3], avgDuration: r[4]
  }));

  onStatus('Done! Updating dashboard...');

  return {
    subscribers: subs,
    totalViews: totalViews,
    videoCount: videoCount,
    watchHours: watchHours,
    revenue: Math.round(revenue * 100) / 100,
    avgViewPct: Math.round(avgViewPct * 10) / 10,
    monthlyRevenue: monthlyRows,
    trafficSources: trafficRows,
    topVideos: topVideos,
    pulledAt: new Date().toISOString(),
  };
}

<script>
  const HASH = '1ace389b3f8bd9bc71123bf6e4c2505fd5086a45fb2a25c3c48506ba1f7dac50';
  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  async function checkAuth() {
    const val = document.getElementById('auth-input').value;
    const hash = await sha256(val);
    if (hash === HASH) {
      sessionStorage.setItem('vaguh_auth', '1');
      document.getElementById('auth-gate').classList.add('hidden');
      document.getElementById('root').style.display = '';
    } else {
      document.getElementById('auth-error').classList.add('show');
      document.getElementById('auth-input').value = '';
      setTimeout(() => document.getElementById('auth-error').classList.remove('show'), 2000);
    }
  }
  document.addEventListener('DOMContentLoaded', function() {
    if (sessionStorage.getItem('vaguh_auth') === '1') {
      document.getElementById('auth-gate').classList.add('hidden');
      document.getElementById('root').style.display = '';
    } else {
      document.getElementById('root').style.display = 'none';
    }
  });
  document.getElementById('auth-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkAuth();
  });
</script>

              flex: "0 0 auto", padding: "11px 18px", border: "none", cursor: "pointer",
              fontSize: 11, fontWeight: 700, transition: "all 0.15s", whiteSpace: "nowrap",
              letterSpacing: 1.5, textTransform: "uppercase",
              background: "transparent",
              color: activeTab === t ? C.white : C.muted,
              borderRadius: 0,
              borderBottom: activeTab === t ? `3px solid ${C.red}` : "3px solid transparent",
            }}>{t}</button>
          ))}
        </div>

        {/* ── TAB CONTENT ── */}
        {activeTab === "Action Plan" && <ActionPlanTab />}
        {activeTab === "Porsche Retitle" && <PorscheRetitleTab />}
        {activeTab === "Affiliate Optimizer" && <AffiliateTab />}
        {activeTab === "Affiliate Revenue" && <AffiliateRevenueTab />}
        {activeTab === "Sponsorship Kit" && <SponsorshipKitTab />}
        {activeTab === "TikTok Strategy" && <TikTokStrategyTab />}
        {activeTab === "Instagram Strategy" && <InstagramStrategyTab />}
        {activeTab === "Facebook Strategy" && <FacebookStrategyTab />}
        {activeTab === "Website & Merch" && <WebsiteMerchTab />}
        {activeTab === "YT Overview" && <OverviewTab />}
        {activeTab === "YT Content" && <ContentTab />}
        {activeTab === "YT Traffic & Audience" && <TrafficTab />}
        {activeTab === "YT Revenue" && <RevenueTab />}
      </div>
    </div>
  );
}

// TAB 2: PORSCHE RETITLE
// ═══════════════════════════════════════════════════════
function PorscheRetitleTab() {
  // Build chart data — short labels for readability
  const shortLabels = porscheRetitles.map((v, i) => {
    const words = v.newTitle.split(" ").slice(0, 3).join(" ");
    return words.length > 18 ? words.slice(0, 18) + "…" : words;
  });
  const ctrChartData = porscheRetitles.map((v, i) => ({
    name: "V" + (i + 1),
    label: shortLabels[i],
    baseline: v.baselineCtr,
    current: v.currentCtr ?? null,
    delta: v.currentCtr != null ? +(v.currentCtr - v.baselineCtr).toFixed(2) : null,
  }));
  const viewsChartData = porscheRetitles.map((v, i) => ({
    name: "V" + (i + 1),
    label: shortLabels[i],
    baseline: v.baselineViews,
    current: v.currentViews ?? null,
    delta: v.currentViews != null ? v.currentViews - v.baselineViews : null,
  }));
  const avgBaselineCtr = +(porscheRetitles.reduce((s, v) => s + v.baselineCtr, 0) / porscheRetitles.length).toFixed(2);
  const totalBaselineViews = porscheRetitles.reduce((s, v) => s + v.baselineViews, 0);
  const hasCurrentData = porscheRetitles.some(v => v.currentCtr != null);

  const CustomCtrTooltip = ({ active, payload }) => {
    if (!active || !payload || !payload.length) return null;
    const d = payload[0].payload;
    return (
      <div style={{ background: "#2e2e2e", boxShadow: "0 4px 12px rgba(0,0,0,0.4)", border: `1px solid ${C.cardBorder}`, borderRadius: 4, padding: "8px 12px", fontSize: 11 }}>
        <div style={{ color: C.titanium, fontWeight: 700, marginBottom: 4 }}>{d.label}</div>
        <div style={{ color: C.red }}>Baseline CTR: {d.baseline}%</div>
        {d.current != null && <div style={{ color: C.green }}>Current CTR: {d.current}%</div>}
        {d.delta != null && <div style={{ color: d.delta >= 0 ? C.green : C.red, fontWeight: 700 }}>{d.delta >= 0 ? "+" : ""}{d.delta}%</div>}
      </div>
    );
  };
  const CustomViewsTooltip = ({ active, payload }) => {
    if (!active || !payload || !payload.length) return null;
    const d = payload[0].payload;
    return (
      <div style={{ background: "#2e2e2e", boxShadow: "0 4px 12px rgba(0,0,0,0.4)", border: `1px solid ${C.cardBorder}`, borderRadius: 4, padding: "8px 12px", fontSize: 11 }}>
        <div style={{ color: C.titanium, fontWeight: 700, marginBottom: 4 }}>{d.label}</div>
        <div style={{ color: C.red }}>Baseline: {d.baseline.toLocaleString()} views</div>
        {d.current != null && <div style={{ color: C.green }}>Current: {d.current.toLocaleString()} views</div>}
        {d.delta != null && <div style={{ color: d.delta >= 0 ? C.green : C.red, fontWeight: 700 }}>{d.delta >= 0 ? "+" : ""}{d.delta.toLocaleString()}</div>}
      </div>
    );
  };

  return (
    <div>
      {/* Header card */}
      <div style={{ ...card, marginBottom: 20, borderLeft: `3px solid ${C.green}` }}>
        <h3 style={{ margin: "0 0 8px", fontSize: 15, fontWeight: 800, color: C.green, letterSpacing: 1, textTransform: "uppercase" }}>Porsche 911 Title Overhaul — {hasCurrentData ? "Performance Tracker" : "Week 1 Baseline"}</h3>
        <p style={{ margin: 0, fontSize: 12, color: C.text, lineHeight: 1.7 }}>
          All <strong style={{ color: C.green }}>15 titles updated</strong> on <strong style={{ color: C.titanium }}>{TITLE_CHANGE_DATE}</strong>.
          {hasCurrentData
            ? " Comparing current performance against baseline metrics recorded at time of change."
            : " Baseline CTR and views recorded at time of change. Charts will show before vs after once new data is pulled."}
        </p>
      </div>

      {/* KPI summary row */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 20 }}>
        <div style={{ ...cardInner, textAlign: "center", borderTop: `2px solid ${C.red}` }}>
          <div style={{ fontSize: 9, color: C.muted, letterSpacing: 1, marginBottom: 4 }}>AVG BASELINE CTR</div>
          <div style={{ fontSize: 24, fontWeight: 900, color: C.red }}>{avgBaselineCtr}%</div>
          <div style={{ fontSize: 9, color: C.muted }}>vs 6.76% channel avg</div>
        </div>
        <div style={{ ...cardInner, textAlign: "center", borderTop: `2px solid ${C.titanium}` }}>
          <div style={{ fontSize: 9, color: C.muted, letterSpacing: 1, marginBottom: 4 }}>TOTAL BASELINE VIEWS</div>
          <div style={{ fontSize: 24, fontWeight: 900, color: C.titanium }}>{totalBaselineViews.toLocaleString()}</div>
          <div style={{ fontSize: 9, color: C.muted }}>across 15 videos</div>
        </div>
        <div style={{ ...cardInner, textAlign: "center", borderTop: `2px solid ${hasCurrentData ? C.green : C.amber}` }}>
          <div style={{ fontSize: 9, color: C.muted, letterSpacing: 1, marginBottom: 4 }}>TRACKING STATUS</div>
          <div style={{ fontSize: 24, fontWeight: 900, color: hasCurrentData ? C.green : C.amber }}>{hasCurrentData ? "ACTIVE" : "BASELINE"}</div>
          <div style={{ fontSize: 9, color: C.muted }}>{hasCurrentData ? "comparing data" : "awaiting first refresh"}</div>
        </div>
      </div>

      {/* CTR Chart */}
      <div style={{ ...card, marginBottom: 16 }}>
        <h4 style={{ margin: "0 0 4px", fontSize: 12, fontWeight: 800, color: C.titanium, letterSpacing: 1, textTransform: "uppercase" }}>CTR by Video {hasCurrentData ? "(Baseline vs Current)" : "(Baseline)"}</h4>
        <p style={{ margin: "0 0 12px", fontSize: 10, color: C.muted }}>Channel average CTR shown as green reference line at 6.76%</p>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={ctrChartData} margin={{ top: 5, right: 10, left: -10, bottom: 5 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.06)" />
            <XAxis dataKey="name" tick={{ fontSize: 9, fill: C.muted }} />
            <YAxis tick={{ fontSize: 9, fill: C.muted }} domain={[0, "auto"]} unit="%" />
            <Tooltip content={<CustomCtrTooltip />} />
            <Bar dataKey="baseline" fill={C.red} radius={[2, 2, 0, 0]} name="Baseline CTR" />
            {hasCurrentData && <Bar dataKey="current" fill={C.green} radius={[2, 2, 0, 0]} name="Current CTR" />}
            <CartesianGrid horizontal={false} vertical={false}>
            </CartesianGrid>
          </BarChart>
        </ResponsiveContainer>
        {/* Channel avg reference note */}
        <div style={{ textAlign: "center", marginTop: 4 }}>
          <span style={{ fontSize: 9, color: C.muted }}>
            <span style={{ display: "inline-block", width: 12, height: 2, background: C.red, marginRight: 4, verticalAlign: "middle" }}></span> Baseline CTR
            {hasCurrentData && <><span style={{ display: "inline-block", width: 12, height: 2, background: C.green, marginLeft: 12, marginRight: 4, verticalAlign: "middle" }}></span> Current CTR</>}
            <span style={{ display: "inline-block", width: 12, height: 2, background: C.green, marginLeft: 12, marginRight: 4, verticalAlign: "middle", opacity: 0.4 }}></span> Channel Avg: 6.76%
          </span>
        </div>
      </div>

      {/* Views Chart */}
      <div style={{ ...card, marginBottom: 20 }}>
        <h4 style={{ margin: "0 0 4px", fontSize: 12, fontWeight: 800, color: C.titanium, letterSpacing: 1, textTransform: "uppercase" }}>Views by Video {hasCurrentData ? "(Baseline vs Current)" : "(Baseline)"}</h4>
        <p style={{ margin: "0 0 12px", fontSize: 10, color: C.muted }}>Total views at time of title change. {hasCurrentData ? "Green bars show current totals." : "New bars will appear after first data pull."}</p>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={viewsChartData} margin={{ top: 5, right: 10, left: -10, bottom: 5 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.06)" />
            <XAxis dataKey="name" tick={{ fontSize: 9, fill: C.muted }} />
            <YAxis tick={{ fontSize: 9, fill: C.muted }} />
            <Tooltip content={<CustomViewsTooltip />} />
            <Bar dataKey="baseline" fill={C.titanium} radius={[2, 2, 0, 0]} name="Baseline Views" />
            {hasCurrentData && <Bar dataKey="current" fill={C.green} radius={[2, 2, 0, 0]} name="Current Views" />}
          </BarChart>
        </ResponsiveContainer>
        <div style={{ textAlign: "center", marginTop: 4 }}>
          <span style={{ fontSize: 9, color: C.muted }}>
            <span style={{ display: "inline-block", width: 12, height: 2, background: C.titanium, marginRight: 4, verticalAlign: "middle" }}></span> Baseline Views
            {hasCurrentData && <><span style={{ display: "inline-block", width: 12, height: 2, background: C.green, marginLeft: 12, marginRight: 4, verticalAlign: "middle" }}></span> Current Views</>}
          </span>
        </div>
      </div>

      {/* Per-video detail cards */}
      <h4 style={{ margin: "0 0 10px", fontSize: 12, fontWeight: 800, color: C.titanium, letterSpacing: 1, textTransform: "uppercase" }}>Per-Video Detail</h4>
      <div style={{ display: "grid", gap: 6 }}>
        {porscheRetitles.map((v, i) => {
          const ctrDelta = v.currentCtr != null ? +(v.currentCtr - v.baselineCtr).toFixed(2) : null;
          const viewsDelta = v.currentViews != null ? v.currentViews - v.baselineViews : null;

                  {ctrDelta != null && (
